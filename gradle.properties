## Gradle
org.gradle.jvmargs=-Xms4g -Xmx4g -Dkotlin.daemon.jvm.options\="-Xmx4g" -Dfile.encoding\=UTF-8 -XX:+UseParallelGC
org.gradle.daemon=true
org.gradle.parallel=true

## Android
android.injected.studio.version.check=false
android.useAndroidX=true
android.nonTransitiveRClass=true
android.nonFinalResIds=true

## Version metadata writes are opt-in to avoid mutating version.properties during ordinary builds.
autojs.gradle.build.number.auto.increment.enabled=false
autojs.gradle.build.time.update.enabled=false

## APK Builder Template plugin
autojs.apkBuilder.templatePlugin.enableRemoteBuild=false
# Filled by scripts/sync_version_from_runtime_kit.py in CI or local release drills.
autojs.apkBuilder.runtimeKitId=

## Configure Java installation settings.
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.auto-download=true
